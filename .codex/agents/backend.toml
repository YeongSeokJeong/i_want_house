from uuid import UUID
from pydantic import BaseModel, Field

class ResourceCreate(BaseModel):
    title: str = Field(..., min_length=1, max_length=200)
    description: str | None = None

class ResourceResponse(BaseModel):
    id: UUID
    title: str
