name: Telegram Backlog Intake Manual Check

on:
  workflow_dispatch:

concurrency:
  group: telegram-backlog-intake
  cancel-in-progress: false

jobs:
  intake:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run tests
        env:
          TELEGRAM_BOT_TOKEN: ""
          TELEGRAM_CHAT_ID: ""
        run: python -m unittest discover -s tests
      - name: Triage Telegram updates
        id: intake
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "Telegram backlog intake skipped: TELEGRAM_BOT_TOKEN is not configured."
            exit 0
          fi

          args="--fetch-updates --write-fetched-updates --updates-path $RUNNER_TEMP/telegram-updates.json --dry-run"
          python -m jeonseloop.telegram_backlog_intake $args
      - name: Triage Telegram ops proposals
        run: |
          args="--updates-path $RUNNER_TEMP/telegram-updates.json --dry-run"
          python -m jeonseloop.telegram_ops $args
