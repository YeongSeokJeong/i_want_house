name: Telegram Backlog Intake

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Read updates and print triage without committing backlog/state changes"
        required: false
        default: "true"

concurrency:
  group: telegram-backlog-intake
  cancel-in-progress: false

jobs:
  intake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run tests
        env:
          TELEGRAM_BOT_TOKEN: ""
          TELEGRAM_CHAT_ID: ""
        run: python -m unittest discover -s tests
      - name: Triage Telegram updates
        id: intake
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "Telegram backlog intake skipped: TELEGRAM_BOT_TOKEN is not configured."
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          args="--fetch-updates --updates-path $RUNNER_TEMP/telegram-updates.json"
          dry_run="false"
          if [ "${{ github.event_name }}" != "schedule" ] && [ "${{ inputs.dry_run }}" != "false" ]; then
            args="$args --dry-run"
            dry_run="true"
          fi
          python -m jeonseloop.telegram_backlog_intake $args
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"
      - name: Persist intake backlog and state
        if: steps.intake.outputs.dry_run == 'false'
        run: |
          if git diff --quiet -- docs/backlog.md data/state/telegram-intake.json; then
            echo "No Telegram backlog intake changes to persist."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/backlog.md data/state/telegram-intake.json
          git commit -m "chore(telegram-intake): persist backlog intake state [skip ci]"
          git push
