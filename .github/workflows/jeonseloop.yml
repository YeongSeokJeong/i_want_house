name: JeonseLoop

on:
  schedule:
    - cron: "0 0,9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without sending alerts or writing state"
        required: false
        default: "true"
      fixture:
        description: "Optional listing fixture path for dry-run verification"
        required: false
        default: "tests/fixtures/listings.json"
      send:
        description: "Allow Telegram sends when TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID are set"
        required: false
        default: "false"

concurrency:
  group: jeonseloop-product-loop
  cancel-in-progress: false

jobs:
  loop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      JEONSELOOP_LISTING_SOURCE_URL: ${{ secrets.JEONSELOOP_LISTING_SOURCE_URL }}
      JEONSELOOP_TRADE_SOURCE_URL: ${{ secrets.JEONSELOOP_TRADE_SOURCE_URL }}
      JEONSELOOP_SOURCE_BEARER_TOKEN: ${{ secrets.JEONSELOOP_SOURCE_BEARER_TOKEN }}
      JEONSELOOP_SOURCE_TIMEOUT_SECONDS: ${{ vars.JEONSELOOP_SOURCE_TIMEOUT_SECONDS || '15' }}
      JEONSELOOP_LLM_REVIEW: ${{ vars.JEONSELOOP_LLM_REVIEW || 'false' }}
      JEONSELOOP_LLM_MODEL: ${{ vars.JEONSELOOP_LLM_MODEL || 'gpt-4.1' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Run JeonseLoop
        id: run-loop
        run: |
          args=""
          dry_run="false"
          if [ "${{ github.event_name }}" != "schedule" ] && [ "${{ inputs.dry_run }}" != "false" ]; then
            dry_run="true"
            args="$args --dry-run"
            if [ -n "${{ inputs.fixture }}" ]; then
              args="$args --fixture ${{ inputs.fixture }}"
            fi
          fi
          if [ "${{ inputs.send }}" = "true" ]; then
            args="$args --send"
          fi
          python -m jeonseloop.run $args
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"
      - name: Persist loop state
        if: steps.run-loop.outputs.dry_run == 'false'
        run: |
          if git diff --quiet -- data logs; then
            echo "No JeonseLoop state changes to persist."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data logs
          git commit -m "chore(jeonseloop): persist loop state [skip ci]"
          git push
